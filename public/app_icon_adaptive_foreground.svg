<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="adaptive-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#34D399" />
      <stop offset="100%" stopColor="#10B981" />
    </linearGradient>
  </defs>

  <!-- Scale slightly down to ensure it sits safely in adaptive launcher bounds (scale = 0.85, centered) -->
  <g transform="translate(38.4, 38.4) scale(0.85)">
    <!-- Pocket -->
    <path
      d="M 150 230 V 320 A 106 106 0 0 0 362 320 V 230"
      stroke="url(#adaptive-gradient)"
      strokeWidth="32"
      strokeLinecap="round"
      strokeLinejoin="round"
    />
    
    <!-- Arrow Chevron -->
    <path
      d="M 216 160 L 256 120 L 296 160"
      stroke="url(#adaptive-gradient)"
      strokeWidth="32"
      strokeLinecap="round"
      strokeLinejoin="round"
    />

    <!-- Arrow Stem -->
    <path
      d="M 256 120 V 250"
      stroke="url(#adaptive-gradient)"
      strokeWidth="32"
      strokeLinecap="round"
    />
  </g>
</svg>
