<svg
  width="1024"
  height="1024"
  viewBox="0 0 512 512"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  style="background: #0B1220"
>
  <defs>
    <linearGradient id="logo-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#34D399" />
      <stop offset="100%" stopColor="#10B981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Stylized Geometric P Logo Mark with glowing chart-arrow -->
  <g filter="url(#glow)">
    <!-- Loop & Stem of the P -->
    <path
      d="M 185 150 H 290 C 330 150 360 180 360 220 C 360 260 330 290 290 290 H 185 V 360"
      stroke="url(#logo-gradient)"
      strokeWidth="32"
      strokeLinecap="round"
      strokeLinejoin="round"
    />
    
    <!-- Zigzag Chart Line ending in Arrow -->
    <path
      d="M 185 340 L 255 260 L 305 310 L 395 220"
      stroke="url(#logo-gradient)"
      strokeWidth="32"
      strokeLinecap="round"
      strokeLinejoin="round"
    />
    
    <!-- Arrow Head -->
    <path
      d="M 335 220 H 395 V 280"
      stroke="url(#logo-gradient)"
      strokeWidth="32"
      strokeLinecap="round"
      strokeLinejoin="round"
    />
  </g>

  <!-- Mixed case App Name Wordmark -->
  <text
    x="256"
    y="440"
    fill="#FFFFFF"
    font-family="'Space Grotesk', sans-serif"
    font-weight="bold"
    font-size="46"
    letter-spacing="-0.5"
    text-anchor="middle"
  >Pocket Ledger</text>
</svg>
